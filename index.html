    <!-- ═══ 캐시 버스팅 & 자동 업데이트 감지 ═══ -->
    <script>
    (function() {
        var CHECK_INTERVAL = 2 * 60 * 1000; // 2분마다 체크 (기존 5분 → 2분)
        var _lastChecked = 0;

        function checkVersion(force) {
            var now = Date.now();
            // 10초 이내 중복 호출 방지
            if (!force && now - _lastChecked < 10000) return;
            _lastChecked = now;

            fetch('./version.json?_=' + now, {
                cache: 'no-store',
                headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache' }
            })
            .then(function(r) {
                if (!r.ok) throw new Error('fetch fail');
                return r.json();
            })
            .then(function(data) {
                var stored = sessionStorage.getItem('_app_version');
                if (!stored) {
                    sessionStorage.setItem('_app_version', data.version);
                } else if (stored !== data.version) {
                    sessionStorage.setItem('_app_version', data.version);
                    var banner = document.getElementById('_update_banner');
                    if (banner) banner.style.display = 'flex';
                }
            })
            .catch(function() { /* 로컬/오프라인 무시 */ });
        }

        window.addEventListener('load', function() {
            // 로드 직후 1초 뒤 첫 체크
            setTimeout(function(){ checkVersion(true); }, 1000);
            setInterval(function(){ checkVersion(false); }, CHECK_INTERVAL);
        });

        // 탭 전환 복귀 시 즉시 체크 (오래 열어둔 탭 대응)
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') checkVersion(true);
        });

        // 창 포커스 복귀 시도 즉시 체크
        window.addEventListener('focus', function() { checkVersion(true); });
    })();
    </script>

        async function navigateTo(page) {
            const contentDiv = document.getElementById('content');

            // ── partner: partner.html을 fetch해서 <main> 영역만 삽입 ──
            if (page === 'partner') {
                contentDiv.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-32 text-slate-400">
                        <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                        <p class="font-bold text-sm">파트너 페이지 불러오는 중...</p>
                    </div>`;
                window.scrollTo({ top: 0, behavior: 'smooth' });
                try {
                   const r = await fetch('./partner.html', { cache: 'no-store' });
                    const html = await r.text();
                    // partner.html의 <main>...</main> 내용만 추출
                    const mainMatch = html.match(/<main[^>]*>([\s\S]*?)<\/main>/i);
                    contentDiv.innerHTML = mainMatch
                        ? `<div class="page-transition">${mainMatch[1]}</div>`
                        : `<div class="page-transition py-20 text-center text-slate-400">파트너 페이지를 불러올 수 없습니다.</div>`;
                    // partner.html의 인라인 <script> 실행
                    contentDiv.querySelectorAll('script').forEach(oldScript => {
                        const s = document.createElement('script');
                        s.textContent = oldScript.textContent;
                        document.body.appendChild(s);
                    });
                    // .p-fade 요소들: IntersectionObserver 대신 즉시 visible 적용
                    // (innerHTML 삽입 직후엔 뷰포트 감지가 불안정하므로 강제 처리)
                    requestAnimationFrame(() => {
                        contentDiv.querySelectorAll('.p-fade').forEach(el => {
                            el.classList.add('visible');
                        });
                    });
                } catch(e) {
                    contentDiv.innerHTML = `<div class="page-transition py-20 text-center text-slate-400">파트너 페이지를 불러올 수 없습니다.</div>`;
                }
                return;
            }

            if (!pages[page]) return;
            // 매번 DOM 새로 생성 → 메뉴/H마크 재클릭 시 항상 fresh fetch
            contentDiv.innerHTML = pages[page];
            // URL은 항상 깔끔하게 유지 (hash 표시 안 함)
            history.replaceState(null, '', location.pathname);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (page === 'fortune') {
                if(window.fortuneReady) {
                    showFortune('today');
                } else {
                    // fortune.html 아직 로드 중 — 완료 후 실행 예약
                    window._pendingFortune = function(){ showFortune('today'); };
                }
            }
            if (page === 'blog') bbsInit();
        }

        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const overlay = document.getElementById('menu-overlay');
            const bar1 = document.getElementById('bar1');
            const bar2 = document.getElementById('bar2');
            const bar3 = document.getElementById('bar3');
            const isOpen = !menu.classList.contains('hidden');
            if (isOpen) {
                menu.classList.add('hidden');
                if(overlay) overlay.style.display = 'none';
                bar1.style.transform = '';
                bar2.style.opacity = '1';
                bar3.style.transform = '';
            } else {
                menu.classList.remove('hidden');
                if(overlay) overlay.style.display = 'block';
                bar1.style.transform = 'translateY(8px) rotate(45deg)';
                bar2.style.opacity = '0';

            }
        }

        async function loadIssues(label, boardType) {
            const el = document.getElementById('bbs-posts');
            el.innerHTML = '<div class="bbs-loading">⏳ 게시글 불러오는 중...</div>';
            try {
                const url = 'https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/issues?labels='+encodeURIComponent(label)+'&state=open&per_page=30&sort=created&direction=desc';
                const r = await fetch(url, {headers:{'Accept':'application/vnd.github.v3+json'}});
                const posts = await r.json();
                if(!posts.length){
                    el.innerHTML = '<div class="bbs-loading">📭 등록된 게시글이 없습니다.' +
                        (boardType==='자유게시판' ? '<br><br><a href="https://github.com/'+GH_OWNER+'/'+GH_REPO+'/issues/new?labels='+encodeURIComponent(label)+'" target="_blank" style="color:#00e5ff">첫 글을 작성해보세요! ✏</a>' : '') +
                        '</div>';
                    return;
                }
                el.dataset.label = label;
                el.innerHTML = posts.map((p,i) => {
                    const d = new Date(p.created_at);
                    const ds = d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0');
                    const commentsBadge = boardType==='자유게시판' ? '<span class="bbs-post-comments">💬 '+p.comments+'</span>' : '';
                    return '<div class="bbs-post" onclick="viewPost('+p.number+',\''+p.title.replace(/'/g,"\\'")+'\',\''+boardType+'\')">'+
                        '<div class="bbs-post-title">'+String(i+1).padStart(2,'0')+'. '+p.title+'</div>'+
                        '<div class="bbs-post-meta">'+
                            '<span>'+ds+'</span>'+
                            '<span>👤 '+p.user.login+'</span>'+
                            commentsBadge+
                        '</div>'+
                    '</div>';
                }).join('');
            } catch(e) {
                el.innerHTML = '<div class="bbs-loading">❌ 불러오기 실패. 잠시 후 다시 시도해주세요.</div>';
            }
        }

        async function viewPost(number, title, boardType) {
            const el = document.getElementById('bbs-posts');
            const label = el.dataset.label || '';
            el.innerHTML = '<div class="bbs-loading">⏳ 글 불러오는 중...</div>';
            try {
                const r = await fetch('https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/issues/'+number, {headers:{'Accept':'application/vnd.github.v3+json'}});
                const post = await r.json();

                const d = new Date(post.created_at);
                const ds = d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0');
                const body = post.body ? post.body.replace(/\n/g,'<br>') : '(내용 없음)';

                const isFree = (boardType === '자유게시판');

                // 댓글 (자유게시판만 giscus)
                let commentsHtml = '';
                if(isFree) {
                    commentsHtml =
                        '<div style="margin-top:24px;border-top:1px solid #1a2a5e;padding-top:16px">'+
                        '<div style="color:#00e5ff;font-size:13px;font-weight:700;margin-bottom:12px">💬 댓글</div>'+
                        '<div id="giscus-container"></div>'+
                        '</div>';
                }

                el.innerHTML =
                    '<span class="bbs-back" onclick="loadIssues(\''+label+'\',\''+boardType+'\')">◀ 목록으로</span>'+
                    '<div style="border-bottom:1px solid #1a2a5e;padding-bottom:14px;margin-bottom:14px">'+
                        '<div style="color:#ffd700;font-size:16px;font-weight:700;margin-bottom:8px">'+post.title+'</div>'+
                        '<div style="color:#4a6fa5;font-size:12px">👤 '+post.user.login+' · '+ds+'</div>'+
                    '</div>'+
                    '<div style="color:#7ec8e3;font-size:14px;line-height:1.9;margin-bottom:20px;min-height:60px">'+body+'</div>'+
                    commentsHtml;

                // giscus 로드 (자유게시판만)
                if(isFree) {
                    setTimeout(() => loadGiscus('issue-'+number), 100);
                }
            } catch(e) {
                el.innerHTML = '<div class="bbs-loading">❌ 불러오기 실패</div>';
            }
        }
