    <script>
        /**
         * Web Audio API Engine
         */
        const SoundEngine = {
            ctx: null,
            masterGain: null,
            bgmNode: null,
            isMuted: false, // BGM이 제거되었으므로 주로 효과음 제어용

            init() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.masterGain = this.ctx.createGain();
                this.masterGain.connect(this.ctx.destination);
                this.masterGain.gain.value = 0.5;
            },

            resume() {
                if (this.ctx && this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            // Synthesize Marimba-like Sound for Typing
            playType(freq = 440) {
                if (this.isMuted || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(freq * 1.5, this.ctx.currentTime + 0.1);

                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);

                osc.connect(gain);
                gain.connect(this.masterGain);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.2);
            },

            // Play Success Bell
            playSuccess() {
                if (this.isMuted || !this.ctx) return;
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator();
                        const g = this.ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = f;
                        g.gain.setValueAtTime(0.2, this.ctx.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                        osc.connect(g);
                        g.connect(this.masterGain);
                        osc.start();
                        osc.stop(this.ctx.currentTime + 0.5);
                    }, i * 100);
                });
            }
            // BGM start/loop functions removed per request
        };

        // Device Detection
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            3: ['코스모스', '카네이션', '개나리', '벚꽃길', '진달래', '무지개', '해바라기', '목련화', '수선화', '라벤더', '민들레', '함박꽃', '달맞이', '안개꽃', '구절초', '채송화', '봉선화', '백일홍', '꽃다발', '꽃바구니'],

            5: ['라벤더향기', '울긋불긋한', '해바라기밭', '싱그러운운봄', '아름다운숲', '비밀의화원', '눈부신햇살', '꽃들의축제', '바람의노래', '마음의정원']
        };

        const bossWordBank = ['벚꽃의숨결', '봄날의기적', '정원의요정', '하얀빛날개', '향기로운꿈', '햇살의축제', '바람의노래', '비밀의화원', '이슬의미소', '은하수정원'];

        let score = 0, lives = 3, combo = 0, gameActive = false, activeWords = [];
        let fallSpeed = isMobile ? 0.045 : 0.054;
        let isFever = false, feverEndTime = 0;
        let comboTimeRemaining = 0;
        const FEVER_DURATION = 10000, COMBO_TIME_LIMIT = 8000;
        const MAX_INPUT_LENGTH = 15; 
        
        let isBossEvent = false;
        let bossHP = 3; 
        let maxBossHP = 3;
        let bossY = -350;
        let nextBossThreshold = 1000;
        const BOSS_INTERVAL = 1000;
        let bossDescentSpeed = isMobile ? 0.012 : 0.017; 
        let currentBossWord = "";

        let lastTime = 0; 
        let lastFiredTime = 0; 
        let resetTimer = null; 
        let spawnTimeoutId = null;
        let lastInputLength = 0; 
        let isDeleting = false; 
        let isComposing = false; 

        function init() {
            // Audio init on click
            window.addEventListener('click', () => { 
                if (!SoundEngine.ctx) SoundEngine.init();
                SoundEngine.resume();
                if(gameActive) inputField.focus(); 
            });
            
            window.addEventListener('resize', () => {
                if(!gameActive) return;
                const fieldWidth = gameField.offsetWidth;
                activeWords.forEach(m => {
                    m.x = m.xPercent * fieldWidth;
                    m.el.style.left = `${m.x}px`;
                });
            });

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    lastTime = performance.now(); 
                }
            });

            inputField.addEventListener('compositionstart', () => { isComposing = true; updateLangIndicator('ko'); });
            inputField.addEventListener('compositionupdate', (e) => { if (e.target.value.length > MAX_INPUT_LENGTH) clearInput(); });
            inputField.addEventListener('compositionend', (e) => { isComposing = false; handleInput(e.target.value); });

            inputField.addEventListener('keydown', (e) => {
                if (!gameActive) return;
                if (!isComposing && /^[a-zA-Z]$/.test(e.key)) {
                    e.preventDefault();
                    updateLangIndicator('en');
                    showTempWarning("한글로 전환해주세요!");
                    return;
                }
                if (e.key === 'Backspace') {
                    isDeleting = true;
                    if (resetTimer) clearTimeout(resetTimer);
                    startResetTimer();
                }
            });

            inputField.addEventListener('input', (e) => {
                if (!gameActive) return;
                let val = e.target.value;
                if (val.length > MAX_INPUT_LENGTH) { clearInput(); return; }
                
                // Sound Effect for Typing remains
                if (val !== "") SoundEngine.playType(300 + (val.length * 50));

                if (/[a-zA-Z]/.test(val)) { val = val.replace(/[a-zA-Z]/g, ''); inputField.value = val; updateLangIndicator('en'); } 
                else if (val !== "") updateLangIndicator('ko');

                const isDeletion = e.inputType && e.inputType.includes("delete");
                if (val !== "" && checkWord(val)) { if (resetTimer) clearTimeout(resetTimer); return; }

                if (isDeletion || isDeleting || val.length < lastInputLength) {
                    isDeleting = true; handleInput(val); lastInputLength = val.length;
                    if(val === "") setTimeout(() => { isDeleting = false; }, 50);
                } else if (val !== "" && val.length >= lastInputLength) {
                    isDeleting = false;
                    const lastChar = val.slice(-1);
                    if (isCompleteHangul(lastChar)) triggerTextBurst(val, lastChar);
                }
                handleInput(val);
                lastInputLength = val.length;
                if (resetTimer) clearTimeout(resetTimer);
                if (val !== "") startResetTimer();
            });

            startGame();
        }

        function isCompleteHangul(char) {
            const code = char.charCodeAt(0);
            return code >= 0xAC00 && code <= 0xD7A3;
        }

        function updateLangIndicator(lang) {
            if (lang === 'ko') { langIndicator.innerText = "한"; langIndicator.className = "ko"; } 
            else { langIndicator.innerText = "A"; langIndicator.className = "en"; }
        }

        function showTempWarning(msg) {
            displayText.innerText = msg;
            displayText.style.color = '#adb5bd';
            setTimeout(() => {
                if (inputField.value === "") { displayText.innerText = isMobile ? "터치하여 입력" : "입력 대기 중..."; displayText.style.color = '#ffb3c1'; } 
                else { displayText.innerText = inputField.value; displayText.style.color = '#ff4d6d'; }
            }, 800);
        }

        function startResetTimer() {
            resetTimer = setTimeout(() => { if (inputField.value !== "") clearInput(); }, 1000);
        }

        function clearInput() {
            inputField.value = "";
            inputField.blur(); 
            lastInputLength = 0;
            isDeleting = false;
            isComposing = false;
            displayText.innerText = isMobile ? "터치하여 입력" : "입력 대기 중...";
            displayText.style.color = '#ffb3c1';
            updateHighlight("");
            if (resetTimer) clearTimeout(resetTimer);
            if(gameActive) setTimeout(() => inputField.focus(), 10);
        }

        function handleInput(val) {
            if (!gameActive) return;
            if (val === "") { displayText.innerText = isMobile ? "터치하여 입력" : "입력 대기 중..."; displayText.style.color = '#ffb3c1'; } 
            else { displayText.innerText = val; displayText.style.color = '#ff4d6d'; }
            updateHighlight(val);
        }

        function triggerTextBurst(fullVal, charToDisplay) {
            if (!fullVal || isDeleting || fullVal.length === 0) return; 
            const now = Date.now();
            if (now - lastFiredTime < 100) return; 
            lastFiredTime = now;

            if (isBossEvent) {
                triggerCharDamage(gameField.offsetWidth / 2, bossY + 150, charToDisplay);
                launchFlowersFromInput({x: gameField.offsetWidth / 2, y: bossY + 150});
            } else {
                let targetCandidate = activeWords.filter(m => m.word.startsWith(fullVal)).sort((a,b)=>b.y-a.y)[0]; 
                if (!targetCandidate && activeWords.length > 0) targetCandidate = activeWords.sort((a,b)=>b.y-a.y)[0];
                if (targetCandidate) {
                    triggerCharDamage(targetCandidate.x, targetCandidate.y, charToDisplay);
                    launchFlowersFromInput(targetCandidate); 
                }
            }
        }

        function launchFlowersFromInput(target) {
            const count = 3;
            const startX = gameField.offsetWidth / 2;
            const startY = gameField.offsetHeight - (isMobile ? 100 : 50);
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'flower-projectile';
                p.innerText = '🌸';
                p.style.left = `${startX}px`;
                p.style.top = `${startY}px`;
                p.style.transform = `translateX(-50%) scale(0)`;
                gameField.appendChild(p);
                p.offsetHeight; 
                p.style.opacity = "1";
                const spreadX = (Math.random() - 0.5) * 100;
                const spreadY = (Math.random() - 0.5) * 40;
                p.style.left = `${target.x + spreadX}px`;
                p.style.top = `${target.y + spreadY}px`;
                p.style.transform = `translateX(-50%) scale(1.2) rotate(${Math.random() * 720}deg)`;
                setTimeout(() => { 
                    p.style.opacity = '0'; p.style.transform += ' scale(0)';
                    setTimeout(() => p.remove(), 600);
                }, 500);
            }
        }

        function triggerCharDamage(x, y, char) {
            if (!char || isDeleting) return; 
            const d = document.createElement('div');
            d.className = `damage-text ${isFever ? 'fever' : ''}`;
            d.innerText = char;
            d.style.left = `${x}px`;
            d.style.top = `${y}px`;
            if (isMobile) d.style.fontSize = '24px';
            gameField.appendChild(d);
            setTimeout(() => { if(d.parentNode) d.remove(); }, 700);
        }

        function spawnLoop() {
            if (!gameActive) return;
            if (!isBossEvent) spawnWord();
            spawnTimeoutId = setTimeout(spawnLoop, (score < 3000 ? 3000 : 2500));
        }

        function spawnWord() {
            if (!gameActive || isBossEvent) return;
            let possibleLengths = [1, 2];
            if (score > 1000) possibleLengths = [2, 3];
            if (score > 3000) possibleLengths = [3, 4, 5];
            const chosenLen = possibleLengths[Math.floor(Math.random() * possibleLengths.length)];
            const list = wordBank[chosenLen];
            const word = list[Math.floor(Math.random() * list.length)];
            const el = document.createElement('div');
            el.className = `word-item`;
            el.innerHTML = `<div class="word-container"><div class="word-base">${word}</div><div class="word-overlay">${word}</div></div>`;
            
            if (isMobile) el.querySelector('.word-container').style.fontSize = '18px';

            const fieldWidth = gameField.offsetWidth;
            const xPercent = Math.random() * 0.7 + 0.15; 
            const x = xPercent * fieldWidth;
            el.style.left = `${x}px`;
            el.style.top = `-50px`;
            gameField.appendChild(el);
            activeWords.push({ el, word, y: -50, x, xPercent, speed: fallSpeed });
        }

        function triggerBoss() {
            isBossEvent = true;
            if (score >= 5000) maxBossHP = 4 + Math.floor((score - 5000) / 3000);
            else maxBossHP = 3;
            
            bossHP = maxBossHP;
            bossY = -350;
            bossContainer.style.display = 'flex';
            if (isMobile) bossContainer.style.transform = 'translateX(-50%) scale(0.7)';
            updateBossHPUI();
            setBossWord();
            
            // Boss sound hint remains
            SoundEngine.playType(200);
        }

        function setBossWord() {
            currentBossWord = bossWordBank[Math.floor(Math.random() * bossWordBank.length)];
            bossWordDisplay.innerText = currentBossWord;
        }

        function updateBossHPUI() {
            bossHpFill.style.width = `${(bossHP / maxBossHP) * 100}%`;
            const progress = 1 - (bossHP / maxBossHP);
            bossBirdColor.style.opacity = progress;
            bossGlow.style.opacity = progress;
        }

        function hitBoss() {
            bossHP--;
            updateBossHPUI();
            SoundEngine.playType(600); 
            const wrapper = document.querySelector('.boss-visual-wrapper');
            wrapper.style.transform = 'scale(1.25) rotate(5deg)';
            setTimeout(() => wrapper.style.transform = '', 150);
            if (bossHP <= 0) clearBoss();
            else setBossWord();
        }

        function clearBoss() {
            bossWordDisplay.innerText = "정화 완료!";
            SoundEngine.playSuccess();
            score += 200 + (maxBossHP * 50);
            scoreDisplay.innerText = score;
            nextBossThreshold += BOSS_INTERVAL;
            setTimeout(() => {
                bossContainer.style.top = '-400px';
                setTimeout(() => { bossContainer.style.display = 'none'; isBossEvent = false; }, 1000);
            }, 1000);
        }

        function gameLoop(timestamp) {
            if (!gameActive) return;

            const dt = timestamp - lastTime;
            lastTime = timestamp;
            const safeDt = Math.min(dt, 50); 

            if (!isBossEvent && score >= nextBossThreshold) triggerBoss();

            if (isBossEvent) {
                bossY += bossDescentSpeed * safeDt;
                bossContainer.style.top = `${bossY}px`;
                const limit = isMobile ? gameField.offsetHeight - 250 : gameField.offsetHeight - 380;
                if (bossY > limit) endGame("벚꽃새가 정원을 떠났습니다!");
            } else {
                const currentMoveSpeed = isFever ? fallSpeed * 0.5 : fallSpeed;
                const deadLine = isMobile ? gameField.offsetHeight - 100 : gameField.offsetHeight - 130;
                for (let i = activeWords.length - 1; i >= 0; i--) {
                    const m = activeWords[i];
                    m.y += currentMoveSpeed * safeDt;
                    m.el.style.top = `${m.y}px`; 
                    if (m.y > deadLine) {
                        lives = Math.max(0, lives - 1);
                        updateLivesUI(); 
                        if(!isFever) { combo = 0; updateComboUI(); }
                        m.el.remove(); activeWords.splice(i, 1);
                        if (lives <= 0) { endGame(); return; }
                    }
                }
            }

            const now = Date.now();
            if (isFever) {
                const remain = feverEndTime - now;
                if (remain <= 0) endFever();
                else { 
                    feverBar.style.width = `${(remain/FEVER_DURATION)*100}%`; 
                    if (Math.random() > 0.9) createFeverParticle(); 
                }
            }
            if (combo > 0 && !isFever) {
                comboTimeRemaining -= safeDt;
                comboTimerBar.style.width = `${Math.max(0, (comboTimeRemaining/COMBO_TIME_LIMIT)*100)}%`;
                if (comboTimeRemaining <= 0) { combo = 0; updateComboUI(); }
            }

            requestAnimationFrame(gameLoop);
        }

        function checkWord(val) {
            const trimmedVal = val.trim();
            if (isBossEvent) {
                if (trimmedVal === currentBossWord) {
                    triggerCharDamage(gameField.offsetWidth / 2, bossY + 150, trimmedVal.slice(-1));
                    hitBoss();
                    clearInput();
                    return true;
                }
            } else {
                const idx = activeWords.findIndex(m => m.word === trimmedVal);
                if (idx !== -1) {
                    const m = activeWords[idx];
                    triggerCharDamage(m.x, m.y, trimmedVal.slice(-1));
                    SoundEngine.playSuccess();
                    let gain = (m.word.length * 20);
                    if (isFever) gain *= 2;
                    m.el.remove(); 
                    activeWords.splice(idx, 1);
                    if (!isFever) {
                        combo++; 
                        comboTimeRemaining = COMBO_TIME_LIMIT;
                        if (combo >= 10) startFever();
                    }
                    score += gain; scoreDisplay.innerText = score;
                    fallSpeed += 0.0002; clearInput(); updateComboUI();
                    return true;
                }
            }
            return false;
        }

        function startFever() {
            isFever = true; feverEndTime = Date.now() + FEVER_DURATION;
            feverTimerContainer.style.display = 'block';
            feverBgLayer.style.display = 'block';
            document.body.style.backgroundColor = '#fff0f3';
            for(let i=0; i<15; i++) setTimeout(createFeverParticle, i * 200);
            SoundEngine.playSuccess(); 
        }

        function createFeverParticle() {
            if (!isFever) return;
            const p = document.createElement('div');
            p.className = 'fever-particle';
            p.innerText = '🌸';
            const duration = Math.random() * 3 + 4; 
            p.style.left = Math.random() * 100 + '%';
            p.style.fontSize = isMobile ? '8px' : '12px'; 
            p.style.setProperty('--sway', (Math.random() - 0.5) * 300 + 'px');
            p.style.setProperty('--rot', (Math.random() - 0.5) * 1500 + 'deg');
            p.style.animationDuration = duration + 's';
            feverBgLayer.appendChild(p);
            setTimeout(() => p.remove(), duration * 1000);
        }

        function endFever() {
            isFever = false; combo = 0; comboTimeRemaining = 0;
            updateComboUI(); feverTimerContainer.style.display = 'none';
            feverBgLayer.style.display = 'none'; feverBgLayer.innerHTML = "";
            document.body.style.backgroundColor = '#fff5f7';
        }

        function updateComboUI() {
            if (combo > 0) { comboPanel.classList.add('active'); comboDisplay.innerText = combo; } 
            else comboPanel.classList.remove('active');
        }

        function updateHighlight(val) {
            if (!isBossEvent) {
                activeWords.forEach(m => {
                    const overlay = m.el.querySelector('.word-overlay');
                    overlay.style.width = (val && m.word.startsWith(val)) ? `${(val.length/m.word.length)*100}%` : '0%';
                });
            }
        }

        function updateLivesUI() {
            const safeLives = Math.max(0, lives);
            const lostLives = Math.max(0, 3 - safeLives);
            lifeDisplay.innerText = '🌸'.repeat(safeLives) + '🥀'.repeat(lostLives);
            if (lives < 3 && lives > 0) SoundEngine.playType(150); 
        }

        function startGame() {
            score = 0; lives = 3; combo = 0; 
            fallSpeed = isMobile ? 0.045 : 0.054; 
            gameActive = true; activeWords = []; isBossEvent = false; 
            nextBossThreshold = 1000;
            scoreDisplay.innerText = "0"; updateLivesUI(); updateComboUI();
            gameOverScreen.style.display = 'none'; bossContainer.style.display = 'none';
            
            const bg = document.getElementById('fever-bg-layer');
            const line = document.getElementById('judgment-line');
            gameField.innerHTML = ''; gameField.appendChild(bg); gameField.appendChild(line); gameField.appendChild(bossContainer);
            
            endFever(); clearInput(); updateLangIndicator('en');
            if (spawnTimeoutId) clearTimeout(spawnTimeoutId);
            
            if (SoundEngine.ctx) {
                SoundEngine.resume();
                // BGM start removed
            }

            lastTime = performance.now();
            spawnLoop(); 
            requestAnimationFrame(gameLoop);
            inputField.focus();
        }

        function endGame(msg = "GARDEN OVER") {
            gameActive = false;
            document.getElementById('over-title').innerText = msg;
            document.getElementById('final-score').innerText = score;
            gameOverScreen.style.display = 'flex';
            if (spawnTimeoutId) clearTimeout(spawnTimeoutId);
            if (resetTimer) clearTimeout(resetTimer);
            SoundEngine.playType(100); 
        }

        window.onload = init;
    </script>

                    document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('border-indigo-600', 'text-indigo-600');
                        b.classList.add('border-transparent', 'text-slate-400');

                    document.getElementById('panel-' + tab).classList.remove('hidden');
                    const btn = document.getElementById('tab-' + tab);
                    btn.classList.add('border-indigo-600', 'text-indigo-600');
                    btn.classList.remove('border-transparent', 'text-slate-400');
                }
