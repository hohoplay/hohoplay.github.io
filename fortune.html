        '절제':          [['균형이 안 잡히고 있거나 너무 힘에 부치죠?','균형을 맞추고 조화롭게 흘러가는 에너지가 있어요.','급하게 서두르거나 극단적인 선택으로 에너지가 불균형한 상태예요.','천천히 가도 돼요. 꾸준함이 지금 가장 강력한 전략이에요.','오늘 하루 일정을 무리하지 않게 조정해보세요. 그것으로 충분해요.'],['중간을 찾지 못하고 극단으로 가고 있죠?','균형이 무너져서 과잉이나 결핍 상태가 되어있어요.','극단적인 행동이나 감정 기복으로 소모가 심한 상태예요.','극단을 피하고 중간 지점을 찾는 것이 지금의 핵심이에요.','오늘 하나를 줄이고, 하나를 더해서 균형점을 찾아가보세요.']],
        '악마':          [['알면서도 못 끊는 게 있어서 자책하고 있죠?','무언가에 지나치게 묶여있는 에너지가 보여요.','의존이나 집착이 진짜 원하는 것을 막고 있는 상태예요.','그 사슬을 처음 인식하는 것 자체가 이미 자유의 시작이에요.','오늘 딱 하루만 그 패턴을 끊어보세요. 하루가 변화의 증거가 돼요.'],['억눌린 것들이 다른 방식으로 튀어나오고 있지 않나요?','억압된 욕구나 감정이 왜곡된 방식으로 표현되고 있어요.','솔직하지 못함이 오히려 더 큰 문제를 만들고 있는 상태예요.','억압보다 인정이 더 건강한 방향이에요.','인정하고 싶지 않았던 감정 하나, 오늘 일기에 솔직하게 써보세요.']],
        '탑':            [['갑자기 모든 게 무너지는 것 같아서 무서죠?','갑작스러운 변화나 충격으로 기존 구조가 흔들리고 있어요.','예상치 못한 일로 인해 불안과 혼란이 극에 달해있는 상태예요.','무너지는 것들은 원래부터 제대로 세워지지 않았던 것들이에요.','지금 당장 복구하려 하지 말고, 먼저 안전한 곳에 서 있어보세요.'],['폭발하기 직전인데 억누르고 있죠?','내부에서 압력이 쌓이는데 아직 터지지 않은 상태예요.','쌓인 긴장이나 불만을 계속 억압하면 더 큰 충격으로 나올 수 있어요.','지금 조금씩 해소하는 게 나중에 한꺼번에 터지는 것보다 낫아요.','신뢰할 수 있는 사람에게 지금 상황을 솔직하게 털어놓아보세요.']],
        '별':            [['지쳐있고 희망이 안 보이는 느낌이죠?','어둠 속에서도 빛이 있다는 에너지가 조용히 흐르고 있어요.','지쳐있어서 아직 주변의 좋은 것들이 잘 안 보이는 상태예요.','희망은 크게 올 때도 있지만, 작은 것에서 먼저 발견돼요.','오늘 딱 한 가지 감사한 것을 찾아보세요. 그게 희망의 시작이에요.'],['희망은 있는데 행동이 안 되고 있죠?','긍정적인 에너지가 있지만 현실에서 발현되지 않고 있어요.','이상은 높지만 현실적인 첫 발을 못 내딛고 있는 상태예요.','희망에 작은 행동 하나를 더하면 현실이 바뀌기 시작해요.','꿈꾸는 것 중 가장 작은 걸음 하나를 오늘 실제로 해보세요.']],
        '달':            [['모든 게 불확실하고 뭔지 모를 불안이 있죠?','무의식과 감각이 활발하게 작동하고 있는 시기예요.','안개 속 같은 상황에서 방향을 못 잡고 있는 상태예요.','지금은 이성보다 감각이 더 정확한 나침반이에요.','직감적으로 맞다는 느낌이 드는 방향으로 한 걸음만 가보세요.'],['두려움이나 망상이 현실 판단을 흐리고 있죠?','불안이 실제보다 크게 느껴지면서 왜곡이 생기고 있어요.','근거 없는 걱정이 실제 결정을 막고 있는 상태예요.','지금 느끼는 두려움 중 실제로 일어난 일과 상상을 구분해보세요.','\"이게 사실인가, 아니면 내 불안인가?\"를 스스로에게 물어보세요.']],
        '태양':          [['잘 되고 있는 게 맞는지 확인하고 싶은 마음이죠?','밝고 명확한 에너지가 지금 강하게 빛나고 있어요.','좋은 흐름 위에 있는데 오히려 의심하거나 못 누리고 있을 수 있어요.','지금 이 좋은 흐름, 맞아요. 더 믿어도 돼요.','지금 잘 되고 있는 것들을 소리 내서 말해보세요. 더 빛날 거예요.'],['좋은 게 있는데 잘 못 느끼거나 표현이 안 되죠?','긍정적인 에너지가 막혀서 기쁨이나 활력이 잘 안 나오고 있어요.','과거의 상처나 피로가 현재의 좋은 것들을 느끼는 걸 막고 있어요.','기쁨을 느끼는 연습이 필요한 시기예요.','오늘 하루 딱 한 가지 즐거운 것만 찾아서 온전히 누려보세요.']],
        '심판':          [['새로운 나로 바뀌어야 할 것 같은데 어떻게 해야 할지 모르죠?','내면에서 깨어나고 다시 태어나는 에너지가 작동하고 있어요.','과거의 나를 버리는 것이 두렵거나 아직 준비가 안 됐다고 느끼는 상태예요.','변화는 한 번에 오는 게 아니라 작은 깨달음들이 쌓여서 와요.','지금 \"더 나은 나\"가 되고 싶은 게 뭔지, 솔직하게 스스로에게 물어보세요.'],['바뀌어야 하는 걸 알면서 계속 미루고 있죠?','변화에 대한 준비가 됐지만 아직 응답을 미루고 있는 상태예요.','내면의 부름은 계속 오는데 두려움이나 게으름이 막고 있어요.','지금 응답하지 않으면 후회가 남아요.','오늘 딱 하나, \"미루고 있던 변화\"를 시작해보세요. 아주 작아도 돼요.']],
        '세계':          [['잘 끝난 것 같은데 다음이 불안하죠?','하나의 사이클이 완성되는 성취의 에너지가 가득해요.','끝났다는 것에 집중하다가 이 성취를 충분히 누리지 못하고 있어요.','지금 이 완성, 충분히 자랑스러워해도 돼요.','오늘은 그냥 지금까지 온 것들을 자축하는 시간을 가져보세요.'],['다 된 것 같은데 마지막 완성이 안 되고 있죠?','마무리가 가까운데 마지막 단계에서 막혀있는 상태예요.','세부적인 것에 집착하거나 완벽주의가 완성을 미루고 있을 수 있어요.','80%의 완성도 완성이에요. 완벽하지 않아도 내보낼 수 있어요.','지금 가장 먼저 마무리해야 할 하나를 정하고 오늘 끝내보세요.']],
      };

      const storyData = CARD_STORIES[nameKo];
      const revIdx = isReversed ? 1 : 0;

      if (storyData) {
        const [empathy, flow, detail, conclusion, action] = storyData[revIdx];
        const posPrefix = {
          0: { 연애: '관계의 배경에서 ', 직장: '커리어 기반에서 ', 일반: '지나온 시간에서 ' },
          1: { 연애: '지금 관계 안에서 ', 직장: '지금 업무에서 ', 일반: '지금 이 순간 ' },
          2: { 연애: '앞으로 관계에서 ', 직장: '앞으로 커리어에서 ', 일반: '앞으로 다가올 때 ' },
        }[idx][cat];
        const revMark = isReversed ? ' 역방향으로 안을 향하는 에너지예요.' : '';

        return `<span style="color:#b8a8d8;font-size:.82em">${posPrefix}${isReversed ? '역방향' : '정방향'} — </span>${empathy} ${flow} ${detail} <strong style="color:#c9a84c">${conclusion}</strong> <em style="color:#9b8fb0;font-size:.92em">${action}</em>`;
      }

      // 78장 외 카드 폴백
      const keywords2 = meaning.split(/[\s,、]+/).filter(k => k.length > 1).slice(0, 3).join(' · ');
      const posIntro = ['이 에너지가 지금 당신을 만들어온 배경에 있어요.', '이 에너지가 지금 강하게 작용하고 있어요.', '이 에너지가 앞으로 찾아올 흐름이에요.'][idx];
      return `${posIntro} ${isReversed ? '아직 내면에서 익고 있는 가능성이에요.' : '이 흐름을 알아채고 따라가보세요.'} 핵심은 <strong>${keywords2}</strong>예요.`;
    }

    // ── MBTI×타로 합성 해석 (하드코딩 폴백 포함) ──
    const MBTI_SYNTH_FALLBACK = {"INTJ|연애":{"past_prefix":"과거의 관계 패턴을 냉철하게 분석해보면","present_prefix":"현재 당신은 감정보다 이성이 앞서고 있으며","future_prefix":"미래에는 신중하게 선택한 상대와 깊은 신뢰를 쌓아가게 됩니다.","synthesis_text":"INTJ인 당신은 연애에서도 전략적으로 접근하는 경향이 있습니다. 감정을 솔직하게 드러내는 것이 어색할 수 있지만, 타로 카드가 보여주는 흐름은 지금이야말로 내면의 감정을 조금씩 열어갈 때라고 말합니다. 완벽한 관계를 기다리기보다 현재의 인연 안에서 진정성을 찾아보세요. 당신의 깊은 통찰력은 관계를 더욱 풍요롭게 만들어줄 것입니다."},"INTJ|직장":{"past_prefix":"과거의 독립적인 노력이 지금의 기반을 만들었으며","present_prefix":"현재 당신의 장기적 계획이 서서히 빛을 발하고 있고","future_prefix":"미래에는 전략적 사고가 커리어의 큰 도약으로 이어집니다.","synthesis_text":"INTJ 특유의 냉철한 분석력과 장기적 시각이 지금 직장에서 강력한 무기가 됩니다. 타로 카드는 당신이 세운 계획의 방향이 옳음을 확인해줍니다. 다만, 혼자 모든 것을 해결하려 하기보다 필요한 순간에 협력하는 유연함을 더한다면 결과가 훨씬 빠르게 나타날 것입니다. 목표를 향한 당신의 집중력을 믿으세요."},"INTJ|일반":{"past_prefix":"과거의 경험들이 지금의 뚜렷한 방향감각을 만들었으며","present_prefix":"현재 당신은 더 큰 그림을 그리며 내면을 정비하고 있고","future_prefix":"미래에는 명확한 목표 아래 원하는 삶을 현실로 만들어갑니다.","synthesis_text":"INTJ인 당신은 삶의 방향이 명확할 때 가장 강력합니다. 타로 카드는 지금이 그 방향을 재점검하고 더욱 정교하게 다듬을 시기임을 알려줍니다. 완벽주의적 성향이 때로 스스로를 힘들게 할 수 있으니, 오늘 하루만큼은 자신에게 여유를 허락해보세요. 당신이 그리는 큰 그림은 반드시 현실이 됩니다."},"INTP|연애":{"past_prefix":"과거에 감정보다 이성적 판단을 우선했던 패턴을 돌아보면","present_prefix":"현재 새로운 관계의 가능성 앞에서 분석과 설렘 사이에 있으며","future_prefix":"미래에는 지적 교류를 통해 깊어지는 특별한 연결이 기다립니다.","synthesis_text":"INTP인 당신은 관계에서도 논리적으로 접근하는 경향이 있습니다. 타로 카드는 지금 당신의 감정이 생각보다 훨씬 풍부하게 흐르고 있음을 보여줍니다. 완벽한 분석보다 조금 더 감정에 몸을 맡겨보는 것이 관계를 한 단계 깊게 만들어줄 것입니다. 당신의 독특한 사고방식 자체가 상대에게 특별한 매력으로 다가갑니다."},"INTP|직장":{"past_prefix":"과거의 깊은 탐구와 아이디어들이 지금의 전문성을 키웠으며","present_prefix":"현재 새로운 이론이나 접근 방식을 완성해가고 있고","future_prefix":"미래에는 창의적 분석이 독보적인 성과로 인정받게 됩니다.","synthesis_text":"INTP 특유의 창의적 분석력과 문제 해결 능력이 직장에서 진가를 발휘할 때입니다. 타로 카드는 지금 당신이 고민하는 아이디어에 진전이 있음을 알려줍니다. 혼자 파고드는 것도 좋지만, 아이디어를 표현하고 공유하면 더 빠른 발전으로 이어집니다. 당신의 사고는 충분히 가치 있습니다."},"INTP|일반":{"past_prefix":"과거의 풍부한 사색이 지금의 넓은 시야를 만들었으며","present_prefix":"현재 새로운 관심사나 프로젝트가 마음을 사로잡고 있고","future_prefix":"미래에는 독창적인 아이디어가 삶을 더욱 흥미롭게 만들어줍니다.","synthesis_text":"INTP인 당신에게 삶은 끝없는 탐구입니다. 타로 카드는 지금 당신이 옳은 방향을 향해 가고 있음을 확인해줍니다. 우유부단하게 느껴지는 선택의 순간들도 사실은 더 나은 답을 찾는 과정입니다. 자신을 믿고 흥미로운 가능성을 향해 나아가세요."},"ENTJ|연애":{"past_prefix":"과거의 적극적인 접근이 관계의 흐름을 주도해왔으며","present_prefix":"현재 리더십 있는 모습이 상대에게 매력으로 작용하고 있고","future_prefix":"미래에는 서로를 성장시키는 강하고 신뢰 깊은 관계가 펼쳐집니다.","synthesis_text":"ENTJ인 당신은 연애에서도 목표 지향적입니다. 타로 카드는 지금 관계에서 당신의 에너지가 크게 작용하고 있음을 보여줍니다. 이끌고자 하는 성향이 강점이지만, 때로는 상대의 페이스를 존중하고 함께 결정하는 것이 관계를 더욱 단단하게 만듭니다. 당신의 카리스마는 이미 충분히 빛납니다."},"ENTJ|직장":{"past_prefix":"과거의 빠른 결단과 추진력이 지금의 성과를 만들었으며","present_prefix":"현재 리더십을 발휘할 중요한 기회가 찾아오고 있고","future_prefix":"미래에는 큰 목표를 향한 도전이 빛나는 결실을 맺게 됩니다.","synthesis_text":"ENTJ 특유의 목표 달성력과 카리스마가 지금 가장 강력하게 발휘될 시기입니다. 타로 카드는 당신이 그리는 큰 그림이 현실에 가까워지고 있음을 알려줍니다. 주변의 의견도 받아들이는 유연함을 더한다면 성과가 더욱 커집니다. 지금 바로 결단하고 나아가세요."},"ENTJ|일반":{"past_prefix":"과거의 강한 의지가 현재의 탄탄한 기반이 되었으며","present_prefix":"현재 더 큰 도약을 위한 준비를 마쳐가고 있고","future_prefix":"미래에는 원하는 것을 정확히 손에 넣는 성취가 기다립니다.","synthesis_text":"ENTJ인 당신은 삶을 주도적으로 설계합니다. 타로 카드는 지금 당신의 방향이 옳음을 확인해주면서도, 주변 사람들과 함께 가는 것의 가치를 일깨워줍니다. 혼자서는 빠르게 가지만 함께라면 더 멀리 갈 수 있습니다. 목표를 향해 당당히 나아가세요."},"ENTP|연애":{"past_prefix":"과거의 자유롭고 활발한 연애 방식이 지금의 나를 만들었으며","present_prefix":"현재 새로운 자극과 흥미로운 사람 사이에서 설레고 있고","future_prefix":"미래에는 지적 자극이 넘치는 역동적인 관계가 꽃피웁니다.","synthesis_text":"ENTP인 당신은 연애에서 늘 새로움과 자극을 추구합니다. 타로 카드는 지금 당신의 매력이 상대에게 강하게 어필되고 있음을 보여줍니다. 다만, 한 사람에게 집중하는 깊이 있는 연결이 지금 가장 필요합니다. 변화를 즐기되, 소중한 인연을 놓치지 않는 균형을 찾아보세요."},"ENTP|직장":{"past_prefix":"과거의 혁신적인 아이디어들이 새로운 가능성을 열었으며","present_prefix":"현재 창의적 발상이 폭발적으로 쏟아지는 시기에 있고","future_prefix":"미래에는 독창적 접근이 팀과 조직에서 인정받게 됩니다.","synthesis_text":"ENTP 특유의 창의력과 빠른 적응력이 직장에서 강점으로 발휘될 시기입니다. 타로 카드는 당신의 아이디어가 지금 매우 강력함을 보여줍니다. 아이디어를 행동으로 옮기는 집중력을 조금만 더 발휘한다면, 주변이 놀랄 만한 결과를 만들어낼 수 있습니다."},"ENTP|일반":{"past_prefix":"과거의 무수한 탐험과 도전이 지금의 유연한 사고를 만들었으며","present_prefix":"현재 흥미로운 가능성들이 사방에서 손짓하고 있고","future_prefix":"미래에는 혁신적인 선택이 삶을 더욱 흥미롭게 바꿔줍니다.","synthesis_text":"ENTP인 당신에게 삶은 끝없는 가능성의 무대입니다. 타로 카드는 지금 당신의 직관이 좋은 방향을 가리키고 있음을 알려줍니다. 집중력이 떨어지는 느낌이 들 때는 가장 열정적인 한 가지에 에너지를 집중해보세요. 당신의 변화 능력은 최고의 자산입니다."},"INFJ|연애":{"past_prefix":"과거의 깊은 감정 탐구가 지금의 섬세한 감수성을 키웠으며","present_prefix":"현재 직관이 관계의 진실을 조용히 알려주고 있고","future_prefix":"미래에는 영혼까지 닿는 깊고 의미 있는 사랑이 기다립니다.","synthesis_text":"INFJ인 당신의 깊은 통찰력과 공감 능력은 연애에서 강력한 빛을 발합니다. 타로 카드는 지금 당신의 직관이 관계에서 옳은 방향을 가리키고 있음을 확인해줍니다. 완벽한 관계를 기다리기보다 현재의 인연 안에서 진정성을 나누어 보세요. 당신의 이상과 현실이 아름답게 만나는 시기가 다가오고 있습니다."},"INFJ|직장":{"past_prefix":"과거의 조용하지만 헌신적인 노력이 신뢰를 쌓아왔으며","present_prefix":"현재 사람을 돕는 방향에서 의미 있는 성과가 나타나고 있고","future_prefix":"미래에는 통찰력과 이상이 커리어에서 빛을 발하게 됩니다.","synthesis_text":"INFJ의 깊은 공감과 통찰이 직장에서 특별한 가치를 만들어냅니다. 타로 카드는 지금 당신이 하는 일이 의미 있는 방향으로 가고 있음을 보여줍니다. 번아웃에 주의하면서 자신의 에너지를 소중히 아껴주세요. 완벽하지 않아도 당신의 헌신은 이미 충분히 가치 있습니다."},"INFJ|일반":{"past_prefix":"과거의 이상과 내면의 탐구가 지금의 깊은 삶을 만들었으며","present_prefix":"현재 직관이 새로운 방향으로 당신을 이끌고 있고","future_prefix":"미래에는 이상이 현실이 되는 의미 있는 변화가 찾아옵니다.","synthesis_text":"INFJ인 당신은 삶의 깊은 의미를 항상 찾습니다. 타로 카드는 지금 당신의 직관이 강하게 작동하고 있으며, 그 감이 옳다는 것을 알려줍니다. 스스로를 너무 몰아붙이지 말고 가끔은 그냥 흘러가도 된다는 것을 기억하세요. 당신이 꿈꾸는 미래는 분명 현실이 됩니다."},"INFP|연애":{"past_prefix":"과거의 순수한 감정과 이상이 지금의 풍부한 감수성이 되었으며","present_prefix":"현재 마음이 이끄는 방향으로 감정이 흘러가고 있고","future_prefix":"미래에는 가치관을 공유하는 진정한 영혼의 파트너를 만납니다.","synthesis_text":"INFP인 당신의 깊고 순수한 감정은 연애에서 가장 아름다운 힘입니다. 타로 카드는 지금 당신의 마음이 올바른 방향을 향하고 있음을 보여줍니다. 감정을 표현하는 것이 때로 어렵게 느껴질 수 있지만, 솔직한 감정이 관계를 더욱 깊게 만들어줍니다. 당신만의 방식으로 사랑하는 것, 그것으로 충분합니다."},"INFP|직장":{"past_prefix":"과거의 창의적 탐구와 가치 기반의 노력이 지금을 만들었으며","present_prefix":"현재 의미 있는 일에서 영감이 솟아오르고 있고","future_prefix":"미래에는 내면의 가치와 일치하는 커리어에서 꽃을 피웁니다.","synthesis_text":"INFP의 창의성과 공감 능력은 의미 있는 일에서 가장 빛납니다. 타로 카드는 지금 당신이 하는 일이 내면의 가치와 연결될 때 놀라운 성과가 나타남을 알려줍니다. 현실적인 부분에서 어려움이 있더라도 당신의 진심은 반드시 전달됩니다. 자신을 너무 비판하지 마세요."},"INFP|일반":{"past_prefix":"과거의 풍부한 감성과 상상이 지금의 창의적 세계관을 만들었으며","present_prefix":"현재 마음이 진정으로 원하는 것을 향해 이동하고 있고","future_prefix":"미래에는 자신만의 빛나는 세계를 현실에서 만들어갑니다.","synthesis_text":"INFP인 당신은 세상을 감성의 눈으로 바라봅니다. 타로 카드는 지금 당신의 내면이 보내는 신호가 진실임을 알려줍니다. 현실 감각이 부족하다고 자책하지 마세요. 감수성과 상상력이야말로 세상을 풍요롭게 만드는 힘입니다. 당신의 꿈을 믿으세요."},"ENFJ|연애":{"past_prefix":"과거의 따뜻한 헌신이 관계의 깊은 신뢰를 쌓아왔으며","present_prefix":"현재 상대에게 힘이 되어주는 따뜻한 에너지가 빛나고 있고","future_prefix":"미래에는 서로를 성장시키는 아름다운 사랑이 펼쳐집니다.","synthesis_text":"ENFJ인 당신은 연애에서 헌신적이고 따뜻합니다. 타로 카드는 지금 당신의 사랑이 상대에게 크게 전달되고 있음을 보여줍니다. 다만, 상대를 위해 자신을 희생하지 않도록 균형을 유지하세요. 자신을 돌보는 것이 관계를 더욱 건강하게 만든다는 것을 기억하세요."},"ENFJ|직장":{"past_prefix":"과거의 리더십과 화합의 노력이 팀의 신뢰를 만들었으며","present_prefix":"현재 사람들을 이끄는 역할에서 뚜렷한 성과가 나타나고 있고","future_prefix":"미래에는 공감 리더십이 조직에서 높이 평가받게 됩니다.","synthesis_text":"ENFJ 특유의 공감 리더십과 화합 능력이 직장에서 강력한 강점이 됩니다. 타로 카드는 지금 당신의 영향력이 주변에 긍정적으로 작용하고 있음을 확인해줍니다. 타인을 돕느라 자신의 목표를 놓치지 않도록 스스로를 먼저 챙기세요. 당신의 리더십은 이미 빛나고 있습니다."},"ENFJ|일반":{"past_prefix":"과거의 따뜻한 관계와 헌신이 지금의 풍요로운 삶을 만들었으며","present_prefix":"현재 주변 사람들과의 깊은 연결에서 큰 기쁨을 얻고 있고","future_prefix":"미래에는 사람 사이의 아름다운 화합이 삶을 빛나게 합니다.","synthesis_text":"ENFJ인 당신에게 사람과의 관계는 삶의 핵심입니다. 타로 카드는 지금 당신의 따뜻한 에너지가 주변을 밝히고 있음을 알려줍니다. 때로는 자신을 위한 시간도 허락하세요. 당신이 건강해야 주변도 더 밝아집니다."},"ENFP|연애":{"past_prefix":"과거의 열정적인 감정 표현이 관계를 활기차게 만들었으며","present_prefix":"현재 로맨틱한 설렘과 새로운 가능성이 피어나고 있고","future_prefix":"미래에는 서로에게 영감을 주는 생동감 넘치는 사랑이 기다립니다.","synthesis_text":"ENFP인 당신의 열정과 낭만은 연애에서 가장 빛납니다. 타로 카드는 지금 당신의 감정이 진실되게 흐르고 있음을 보여줍니다. 새로운 것을 향한 호기심이 강점이지만, 현재 소중한 인연에 집중하는 깊이도 함께 키워보세요. 당신의 열정은 상대에게 분명히 전달됩니다."},"ENFP|직장":{"past_prefix":"과거의 폭발적인 영감과 창의성이 새로운 길을 열었으며","present_prefix":"현재 아이디어가 넘치며 팀에 활력을 불어넣고 있고","future_prefix":"미래에는 열정이 구체적인 성과로 연결되는 흐름이 옵니다.","synthesis_text":"ENFP의 창의성과 에너지는 직장에서 강력한 원동력이 됩니다. 타로 카드는 지금 당신의 아이디어가 주변에 긍정적인 영향을 미치고 있음을 알려줍니다. 집중력을 유지하며 하나씩 완성해가면 더 빠른 결과를 얻을 수 있습니다. 당신의 열정은 최고의 자산입니다."},"ENFP|일반":{"past_prefix":"과거의 자유롭고 열정적인 탐험이 지금의 풍부한 삶을 만들었으며","present_prefix":"현재 새로운 관심사와 가능성이 문을 두드리고 있고","future_prefix":"미래에는 열정이 삶을 더욱 풍요롭고 의미 있게 만들어줍니다.","synthesis_text":"ENFP인 당신은 삶 자체를 사랑합니다. 타로 카드는 지금 당신의 에너지가 높고 좋은 흐름 위에 있음을 확인해줍니다. 가끔 감정 기복이 있더라도 그것이 당신의 풍부한 감성의 증거입니다. 오늘도 당신만의 빛으로 세상을 밝혀주세요."},"ISTJ|연애":{"past_prefix":"과거의 한결같은 헌신이 관계의 탄탄한 신뢰를 쌓았으며","present_prefix":"현재 안정적이고 진실된 모습이 상대에게 큰 믿음을 주고 있고","future_prefix":"미래에는 오래 지속되는 든든한 사랑이 완성됩니다.","synthesis_text":"ISTJ인 당신의 꾸준함과 신뢰는 연애에서 가장 강력한 매력입니다. 타로 카드는 지금 당신의 성실한 모습이 상대에게 분명하게 전달되고 있음을 보여줍니다. 가끔은 변화를 받아들이고 감정을 더 솔직하게 표현해보세요. 당신의 헌신은 이미 충분히 빛납니다."},"ISTJ|직장":{"past_prefix":"과거의 성실하고 꼼꼼한 업무 방식이 지금의 신뢰를 만들었으며","present_prefix":"현재 규칙과 절차를 따르는 노력이 안정적인 성과를 내고 있고","future_prefix":"미래에는 꾸준함이 빛을 발하는 확실한 결실이 기다립니다.","synthesis_text":"ISTJ 특유의 신뢰성과 성실함이 직장에서 가장 큰 강점입니다. 타로 카드는 지금 당신의 업무 방식이 옳음을 확인해줍니다. 변화하는 환경에서도 당신만의 꼼꼼함과 책임감을 유지한다면 주변의 신뢰는 더욱 깊어집니다. 꾸준함이 최고의 전략입니다."},"ISTJ|일반":{"past_prefix":"과거의 성실한 노력과 책임감이 지금의 안정적 삶을 만들었으며","present_prefix":"현재 검증된 방식으로 묵묵히 나아가고 있고","future_prefix":"미래에는 꾸준한 발걸음이 원하는 목적지에 닿게 됩니다.","synthesis_text":"ISTJ인 당신은 삶에서 안정과 신뢰를 가장 중요하게 여깁니다. 타로 카드는 지금 당신의 방향이 옳으며 노력이 쌓이고 있음을 알려줍니다. 가끔 새로운 방식도 시도해보는 용기가 삶을 더욱 풍요롭게 만들어줄 수 있습니다. 당신의 성실함은 반드시 보상받습니다."},"ISFJ|연애":{"past_prefix":"과거의 세심하고 헌신적인 사랑이 관계의 따뜻한 기반이 되었으며","present_prefix":"현재 조용하지만 깊은 배려가 상대에게 전달되고 있고","future_prefix":"미래에는 서로를 보살피는 따뜻하고 안정적인 사랑이 이어집니다.","synthesis_text":"ISFJ인 당신의 따뜻한 배려와 헌신은 연애에서 아름다운 힘입니다. 타로 카드는 지금 당신의 진심이 상대에게 분명히 닿고 있음을 보여줍니다. 자신의 필요와 감정도 소중하게 여기세요. 상대를 위해 자신을 잃지 않는 균형이 관계를 더욱 건강하게 만듭니다."},"ISFJ|직장":{"past_prefix":"과거의 묵묵한 지원과 세심한 업무 처리가 신뢰를 쌓았으며","present_prefix":"현재 뒤에서 조용히 팀을 돕는 역할이 빛을 발하고 있고","future_prefix":"미래에는 당신의 배려가 큰 인정과 보상으로 돌아옵니다.","synthesis_text":"ISFJ 특유의 헌신과 세심함이 직장에서 팀의 든든한 기반이 됩니다. 타로 카드는 지금 당신의 노력이 주변에 긍정적 영향을 미치고 있음을 확인해줍니다. 자신의 의견과 공헌을 더 적극적으로 표현하면 더 큰 인정을 받을 수 있습니다."},"ISFJ|일반":{"past_prefix":"과거의 헌신과 충성심이 지금의 따뜻한 인간관계를 만들었으며","present_prefix":"현재 소중한 사람들을 위한 배려가 삶을 풍요롭게 하고 있고","future_prefix":"미래에는 당신의 따뜻함이 더 큰 행복으로 돌아옵니다.","synthesis_text":"ISFJ인 당신은 주변 사람들을 위해 항상 최선을 다합니다. 타로 카드는 지금 당신의 선한 에너지가 삶을 아름답게 만들고 있음을 알려줍니다. 자신을 위한 시간도 충분히 갖는 것을 잊지 마세요. 당신이 행복해야 주변도 더 따뜻해집니다."},"ESTJ|연애":{"past_prefix":"과거의 전통적이고 헌신적인 사랑이 관계의 신뢰를 만들었으며","present_prefix":"현재 책임감 있는 모습이 상대에게 든든함을 주고 있고","future_prefix":"미래에는 함께 목표를 향해 나아가는 강인한 파트너십이 됩니다.","synthesis_text":"ESTJ인 당신은 연애에서도 책임감과 추진력이 빛납니다. 타로 카드는 지금 당신의 진지한 태도가 관계를 안정시키고 있음을 보여줍니다. 감정 표현을 조금 더 부드럽게 하고 상대의 감성적 필요도 채워준다면 관계가 더욱 따뜻해질 것입니다."},"ESTJ|직장":{"past_prefix":"과거의 체계적이고 책임감 있는 업무 방식이 지금의 기반을 만들었으며","present_prefix":"현재 조직력으로 팀을 이끄는 능력이 인정받고 있고","future_prefix":"미래에는 체계적인 접근이 큰 성공으로 이어집니다.","synthesis_text":"ESTJ 특유의 조직력과 추진력이 직장에서 최대로 발휘될 때입니다. 타로 카드는 지금 당신의 체계적인 접근이 성과를 만들고 있음을 확인해줍니다. 팀원들의 의견도 유연하게 수용한다면 리더십이 한 단계 더 성장합니다."},"ESTJ|일반":{"past_prefix":"과거의 성실하고 규칙적인 노력이 지금의 안정을 만들었으며","present_prefix":"현재 체계적인 계획이 삶을 질서 있게 이끌고 있고","future_prefix":"미래에는 논리와 효율이 원하는 결과를 정확하게 가져다줍니다.","synthesis_text":"ESTJ인 당신은 삶을 체계적으로 관리하는 능력이 탁월합니다. 타로 카드는 지금 당신의 방향이 옳음을 알려줍니다. 때로는 유연함을 더해 예상치 못한 좋은 기회를 놓치지 않도록 열린 마음을 유지해보세요."},"ESFJ|연애":{"past_prefix":"과거의 헌신적이고 따뜻한 사랑이 관계의 화목한 기반이 되었으며","present_prefix":"현재 상대에게 기쁨을 주는 따뜻한 에너지가 빛나고 있고","future_prefix":"미래에는 모두를 행복하게 만드는 아름다운 사랑이 이어집니다.","synthesis_text":"ESFJ인 당신은 사랑하는 사람을 위해 최선을 다합니다. 타로 카드는 지금 당신의 따뜻한 마음이 관계를 밝히고 있음을 보여줍니다. 자신의 감정과 필요도 소중히 여기며, 서로를 위한 균형을 찾아보세요. 당신의 사랑은 충분히 아름답습니다."},"ESFJ|직장":{"past_prefix":"과거의 팀워크와 화합 노력이 좋은 평판을 만들었으며","present_prefix":"현재 사람들과의 협력에서 특별한 성과가 나타나고 있고","future_prefix":"미래에는 관계에서 얻은 신뢰가 커리어를 성장시킵니다.","synthesis_text":"ESFJ 특유의 배려심과 화합 능력이 직장에서 팀의 핵심이 됩니다. 타로 카드는 지금 당신의 대인관계 능력이 빛나고 있음을 확인해줍니다. 비판에 흔들리지 말고 자신의 판단도 믿어보세요."},"ESFJ|일반":{"past_prefix":"과거의 따뜻한 관계와 화합의 노력이 지금의 풍요로운 삶을 만들었으며","present_prefix":"현재 주변 사람들과의 연결에서 기쁨과 의미를 얻고 있고","future_prefix":"미래에는 따뜻한 관계가 삶의 가장 빛나는 부분이 됩니다.","synthesis_text":"ESFJ인 당신에게 사람과의 관계는 삶의 전부입니다. 타로 카드는 지금 당신의 따뜻한 에너지가 주변을 풍요롭게 만들고 있음을 알려줍니다. 자신을 위한 시간도 허락하는 균형을 잊지 마세요."},"ISTP|연애":{"past_prefix":"과거의 자유롭고 독립적인 연애 방식이 지금의 나를 만들었으며","present_prefix":"현재 실용적이고 진실된 모습이 상대에게 매력으로 다가가고 있고","future_prefix":"미래에는 서로의 독립성을 존중하는 성숙한 사랑이 자랍니다.","synthesis_text":"ISTP인 당신은 연애에서도 독립적이고 현실적입니다. 타로 카드는 지금 당신의 진실된 모습이 상대에게 신뢰를 주고 있음을 보여줍니다. 감정 표현이 서툴더라도 작은 행동 하나가 상대에게 큰 의미가 됩니다. 당신만의 방식으로 충분합니다."},"ISTP|직장":{"past_prefix":"과거의 실용적 문제 해결 능력이 지금의 전문성을 만들었으며","present_prefix":"현재 독립적인 방식으로 핵심 문제를 해결하고 있고","future_prefix":"미래에는 실행력이 두드러진 성과로 이어집니다.","synthesis_text":"ISTP 특유의 실용적 문제 해결 능력이 직장에서 빛납니다. 타로 카드는 지금 당신의 능력이 업무에서 강점으로 발휘되고 있음을 알려줍니다. 팀과의 소통을 조금 더 적극적으로 한다면 더 큰 인정을 받을 수 있습니다."},"ISTP|일반":{"past_prefix":"과거의 도전과 실험적 경험이 지금의 유연한 문제 해결력을 만들었으며","present_prefix":"현재 현실적인 방식으로 상황을 정확히 파악하고 있고","future_prefix":"미래에는 실행력이 삶의 원하는 변화를 만들어냅니다.","synthesis_text":"ISTP인 당신은 현실을 정확하게 보고 즉각 행동하는 능력이 있습니다. 타로 카드는 지금 당신의 판단이 옳은 방향을 향하고 있음을 확인해줍니다. 때로는 감정을 돌보는 시간도 에너지 충전에 도움이 됩니다."},"ISFP|연애":{"past_prefix":"과거의 조용하고 진실한 감정이 관계에 깊은 의미를 더했으며","present_prefix":"현재 감성적이고 현재에 충실한 모습이 상대를 감동시키고 있고","future_prefix":"미래에는 순수하고 진실한 사랑이 아름답게 꽃핍니다.","synthesis_text":"ISFP인 당신의 감수성과 진실함은 연애에서 가장 큰 매력입니다. 타로 카드는 지금 당신의 감정이 상대에게 진실되게 전달되고 있음을 보여줍니다. 자신의 감정과 필요를 조금 더 적극적으로 표현해보세요. 당신만의 조용한 사랑은 충분히 아름답습니다."},"ISFP|직장":{"past_prefix":"과거의 감수성 있는 창의적 접근이 독특한 성과를 만들었으며","present_prefix":"현재 자신만의 방식으로 의미 있는 일을 해나가고 있고","future_prefix":"미래에는 예술적 감성이 커리어에서 빛나는 결실을 맺습니다.","synthesis_text":"ISFP의 감수성과 예술적 감각이 직장에서 독특한 강점이 됩니다. 타로 카드는 지금 당신의 방식이 충분히 가치 있음을 알려줍니다. 자신의 아이디어와 의견을 더 적극적으로 표현해보세요."},"ISFP|일반":{"past_prefix":"과거의 감성적이고 열린 경험들이 지금의 풍부한 세계관을 만들었으며","present_prefix":"현재 현재 순간에 충실하며 삶의 아름다움을 발견하고 있고","future_prefix":"미래에는 감성이 삶을 더욱 특별하고 풍요롭게 만들어줍니다.","synthesis_text":"ISFP인 당신은 현재 이 순간의 아름다움을 누구보다 잘 느낍니다. 타로 카드는 지금 당신의 삶에 감사할 것들이 가득함을 상기시켜줍니다. 미래 계획이 부족하다고 느껴도 당신만의 방식이 결국 좋은 곳으로 이끌어줄 것입니다."},"ESTP|연애":{"past_prefix":"과거의 스릴 있고 즉흥적인 연애 경험이 지금의 매력을 만들었으며","present_prefix":"현재 활동적이고 유쾌한 에너지가 상대를 사로잡고 있고","future_prefix":"미래에는 함께 즐기며 성장하는 역동적인 관계가 펼쳐집니다.","synthesis_text":"ESTP인 당신은 연애에서 활기차고 매력적입니다. 타로 카드는 지금 당신의 에너지가 상대에게 강하게 어필되고 있음을 보여줍니다. 충동적인 결정보다는 소중한 인연에 조금 더 깊이 집중해보세요. 당신의 활력은 관계를 늘 생동감 있게 만들어줍니다."},"ESTP|직장":{"past_prefix":"과거의 빠른 판단과 실행력이 기회를 잡아왔으며","present_prefix":"현재 현실적인 판단으로 즉각적인 성과를 만들고 있고","future_prefix":"미래에는 행동력이 커리어의 중요한 전환점을 만들어냅니다.","synthesis_text":"ESTP 특유의 행동력과 유연한 적응력이 직장에서 강점으로 발휘될 시기입니다. 타로 카드는 지금 바로 행동에 나설 적절한 타이밍임을 알려줍니다. 조금 더 계획적으로 접근한다면 성과가 더욱 탄탄해집니다."},"ESTP|일반":{"past_prefix":"과거의 즉흥적인 도전과 경험이 지금의 유연한 사고를 만들었으며","present_prefix":"현재 현실을 정확하게 파악하며 기회를 잡고 있고","future_prefix":"미래에는 행동력이 삶의 원하는 변화를 빠르게 만들어냅니다.","synthesis_text":"ESTP인 당신은 삶에서 기회를 빠르게 포착합니다. 타로 카드는 지금 당신 앞에 좋은 기회가 있음을 알려줍니다. 지금 바로 행동하되, 중요한 결정에서는 한 호흡 여유를 갖는 것도 필요합니다."},"ESFP|연애":{"past_prefix":"과거의 열정적이고 즐거운 연애 경험이 지금의 매력을 만들었으며","present_prefix":"현재 낙관적이고 따뜻한 에너지로 상대를 행복하게 하고 있고","future_prefix":"미래에는 기쁨과 축제가 넘치는 사랑이 피어납니다.","synthesis_text":"ESFP인 당신의 낙관성과 열정은 연애에서 가장 큰 매력입니다. 타로 카드는 지금 당신의 에너지가 관계를 밝고 활기차게 만들고 있음을 보여줍니다. 즉흥적인 감정보다는 상대의 깊은 감정도 살펴보는 균형이 관계를 더욱 풍요롭게 합니다."},"ESFP|직장":{"past_prefix":"과거의 활발한 소통과 에너지가 좋은 평판을 만들었으며","present_prefix":"현재 사람들에게 활력을 불어넣는 역할이 빛을 발하고 있고","future_prefix":"미래에는 열정적인 참여가 커리어에 특별한 기회를 가져다줍니다.","synthesis_text":"ESFP 특유의 낙관성과 사교성이 직장에서 에너지의 원천이 됩니다. 타로 카드는 지금 당신의 존재 자체가 팀에 긍정적 영향을 미치고 있음을 확인해줍니다. 조금 더 계획적으로 접근하면 더 빠른 성과로 이어집니다."},"ESFP|일반":{"past_prefix":"과거의 즐겁고 자유로운 경험이 지금의 긍정적 세계관을 만들었으며","present_prefix":"현재 삶의 기쁨을 만끽하며 좋은 에너지를 발산하고 있고","future_prefix":"미래에는 열정과 낙관이 삶에 축제 같은 순간을 계속 선물합니다.","synthesis_text":"ESFP인 당신은 삶을 축제처럼 즐깁니다. 타로 카드는 지금 당신의 밝은 에너지가 삶을 풍요롭게 만들고 있음을 알려줍니다. 때로는 미래를 위한 계획도 재미있게 세워보세요. 당신의 기쁨은 주변 모두를 밝게 만듭니다."}};

    let MBTI_SYNTH_MAP = Object.assign({}, MBTI_SYNTH_FALLBACK);
    let mbtiSynthLoaded = false;
    async function loadMbtiSynthesis() {
      if(mbtiSynthLoaded) return;
      try {
        const res = await fetch('data/mbti_tarot_synthesis.csv');
        if(!res.ok) throw new Error('mbti synth CSV 없음');
        const rawText = await res.text();
        const lines = rawText.trim().split('\n');
        lines.slice(1).forEach(line => {
          const cols = []; let cur='', inQ=false;
          for(let i=0;i<line.length;i++){
            if(line[i]==='"'){inQ=!inQ;}
            else if(line[i]===',' && !inQ){cols.push(cur);cur='';}
            else{cur+=line[i];}
          }
          cols.push(cur);
          const [mbti, cat, past, present, future, synth] = cols.map(c=>c.trim());
          if(mbti&&cat) MBTI_SYNTH_MAP[mbti+'|'+cat] = {past_prefix:past, present_prefix:present, future_prefix:future, synthesis_text:synth};
        });
        mbtiSynthLoaded = true;
      } catch(e){ console.warn('MBTI합성 CSV 로드 실패 — 폴백 사용'); }
      mbtiSynthLoaded = true;
    }
    function getMbtiSynthCat(question) {
      if(/연애|관계|사랑|연인/.test(question)) return '연애';
      if(/직|일|돈|금|커리어|취업/.test(question)) return '직장';
      return '일반';
    }
    let tQuestion = '';
    let tDrawnCards = [];
    let tRevealedCount = 0;

    // 카드별 이모지 매핑
    const TAROT_EMOJI = {
      '바보':'🌟','마법사':'🪄','여사제':'🌙','여황제':'👑','황제':'🏛️',
      '교황':'⛪','연인':'💕','전차':'🏆','힘':'🦁','은둔자':'🕯️',
      '운명의 수레바퀴':'⭕','정의':'⚖️','매달린 남자':'🔄','죽음':'🌑',
      '절제':'⚗️','악마':'⛓️','탑':'⚡','별':'⭐','달':'🌕','태양':'☀️',
      '심판':'🎺','세계':'🌍',
    };
    function getTarotEmoji(nameKo, arcana, suit) {
      if(TAROT_EMOJI[nameKo]) return TAROT_EMOJI[nameKo];
      const suitEmoji = {Wands:'🔥',Cups:'💧',Swords:'⚔️',Pentacles:'🌿'};
      return suitEmoji[suit] || (arcana==='Major'?'✨':'🃏');
    }

    // CSV 파싱 (간단 구현)
    function parseTarotCSV(text) {
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',');
      return lines.slice(1).map(line => {
        // CSV 따옴표 처리
        const cols = [];
        let cur = '', inQ = false;
        for(let i=0;i<line.length;i++){
          if(line[i]==='"'){inQ=!inQ;}
          else if(line[i]===',' && !inQ){cols.push(cur);cur='';}
          else{cur+=line[i];}
        }
        cols.push(cur);
        const obj = {};
        headers.forEach((h,i) => obj[h.trim()] = (cols[i]||'').trim());
        // 키워드를 keywords_ko 컬럼에서 가져오고 이모지 추가
        const nameKo = obj.card_name_ko || '';
        obj.emoji = getTarotEmoji(nameKo, obj.arcana, obj.suit || '');
        obj.keywords = obj.keywords_ko || '';
        return obj;
      });
    }

    // CSV 로드 (data 폴더)
    async function loadTarotDeck() {
      if(tDeckLoaded) return tDeck;
      try {
        const res = await fetch('data/tarot_cards_78.csv');
        if(!res.ok) throw new Error('CSV 로드 실패');
        const text = await res.text();
        tDeck = parseTarotCSV(text);
        tDeckLoaded = true;
        return tDeck;
      } catch(e) {
        console.warn('CSV 로드 실패, 내장 데이터 사용:', e);
        tDeck = TAROT_FALLBACK;
        tDeckLoaded = true;
        return tDeck;
      }
    }

    // 셔플
    function tShuffle(arr) {
      const a = [...arr];
      for(let i=a.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    }

    // 타로 초기화
    async function initTarot() {
      const inner = document.getElementById('tarot-inner');
      if(!inner) return;
      await loadTarotDeck();
      tQuestion = '';
      tDrawnCards = [];
      tRevealedCount = 0;
      renderTarotUI();
    }

    // 타로 UI 렌더링
    function renderTarotUI() {
      const inner = document.getElementById('tarot-inner');
      if(!inner) return;
      const qList = ['연애와 관계','직업과 진로','금전과 재물','건강과 웰빙','인간관계','자기 성장'];
      inner.innerHTML = `
        <div class="tarot-q-grid">
          ${qList.map(q=>`<button class="tarot-q-btn" onclick="tSelectQ('${q}',this)">${q}</button>`).join('')}
        </div>
        <div class="tarot-custom-wrap">
          <input id="tarot-custom-q" placeholder="직접 질문 입력 (예: 이 선택이 맞을까요?)" />
          <button onclick="tApplyCustomQ()">입력</button>
        </div>
        <button class="tarot-draw-btn" id="tarot-draw-btn" onclick="tDrawCards()" disabled>✦ 카드 뽑기 ✦</button>
        <div id="tarot-cards-area" style="display:none">
          <div class="tarot-cards-row" id="tarot-cards-row"></div>

    function tDrawCards() {

      // ── 카드 뽑기 로딩 ──
      const _drawBtn = document.getElementById('tarot-draw-btn');
      showBtnLoading(_drawBtn, '카드를 섞는 중...');
      // 로딩 중 광고 슬롯 표시
      const _tarotResultArea = document.getElementById('tarot-result-area');
      if(_tarotResultArea){ _tarotResultArea.style.display='block'; _tarotResultArea.innerHTML='<div style="text-align:center;padding:24px 16px 8px"><span style="display:inline-block;width:24px;height:24px;border:3px solid rgba(120,60,200,.2);border-top-color:#7c3aed;border-radius:50%;animation:btnSpin .7s linear infinite;vertical-align:middle;margin-right:8px"></span><span style="color:#9b8fb0;font-size:14px">카드를 섞는 중...</span></div>' + getLoadingAdHTML(); }
      setTimeout(function(){
        tRevealedCount = 0;
        const pool = tShuffle(tDeck);
        tDrawnCards = pool.slice(0,3).map(card => ({
          ...card,
          isReversed: Math.random() < 0.33

        hideBtnLoading(_drawBtn);
        _drawBtn.disabled = true;
        document.getElementById('tarot-cards-area').style.display = 'block';

    function tRevealCard(i) {

      if(tRevealedCount===3) {
        document.getElementById('tarot-reveal-all').style.display='none';
        tShowInterpretation();

    function _hasJongseong(str) {
      const ch = str[str.length - 1];
      const code = ch.charCodeAt(0);
      if (code < 0xAC00 || code > 0xD7A3) return false; // 한글 아니면 false
      return (code - 0xAC00) % 28 !== 0;
    }
    function _josa(word, withJong, withoutJong) {
      return word + (_hasJongseong(word) ? withJong : withoutJong);
    }

    function tCardMeaningSentence(card) {
      const raw = (card.isReversed ? card.reversed_meaning : card.upright_meaning) || '';
      const words = raw.split(/[\s,·]+/).filter(Boolean);
      if (words.length === 0) return `${card.card_name_ko}의 기운이 흐르고 있어요`;
      // 형용사형(~인, ~운, ~는, ~로운) 단어는 뒤 단어와 묶어서 명사구로
      function isAdjForm(w) { return /[인운는른]$/.test(w); }
      let picked = [];
      for (let i = 0; i < words.length && picked.length < 2; i++) {
        if (isAdjForm(words[i]) && words[i+1]) {
          picked.push(words[i] + ' ' + words[i+1]);
          i++;
        } else {
          picked.push(words[i]);
        }
      }
      const phrase = picked.length >= 2
        ? `${picked[0]}${_hasJongseong(picked[0])?"과":"와"} ${picked[1]}의 기운`
        : `${picked[0]}의 기운`;
      const subj = `${phrase}${_hasJongseong(phrase)?"이":"가"}`;
      return card.isReversed
        ? `${subj} 아직 충분히 드러나지 못하고 안쪽에 머물러 있어요`
        : `${subj} 지금 가장 중심에서 작용하고 있어요`;
    }

      const ko = card.card_name_ko;
      return CARD_EMPATHY_NARR[ko]

        : tCardMeaningSentence(card);

        </div>`;
    }
    function showBtnLoading(btn, loadingText) {
        if (!btn) return;
        btn._origHTML = btn.innerHTML;
        btn._origDisabled = btn.disabled;
        btn.disabled = true;
        btn.innerHTML = '<span class="btn-spinner"></span>' + (loadingText || '처리 중...');
        btn.classList.add('btn-loading');
    }
    function hideBtnLoading(btn) {
        if (!btn || btn._origHTML === undefined) return;
        btn.innerHTML = btn._origHTML;
        btn.disabled = btn._origDisabled || false;
        btn.classList.remove('btn-loading');
        delete btn._origHTML;
        delete btn._origDisabled;
    }
