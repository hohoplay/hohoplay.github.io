<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 운세 모험 — HOHO PLAY</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        * { font-family: 'Noto Sans KR', sans-serif; box-sizing: border-box; }
        body { background: #f8f7ff; min-height: 100vh; display: flex; flex-direction: column; }

        /* 네비 */
        nav { background: rgba(255,255,255,.85); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 50; }

        /* 히어로 배너 */
        .hero-banner {
            width: 100%;
            position: relative;
            overflow: hidden;
            border-radius: 0 0 32px 32px;
            box-shadow: 0 8px 40px rgba(99,102,241,.18);
        }
        .hero-banner img { width: 100%; height: auto; display: block; }

        /* 카드 공통 */
        .fate-card {
            background: white;
            border-radius: 28px;
            padding: 32px 28px;
            border: 1.5px solid #ede9fe;
            transition: transform .2s, box-shadow .2s;
            cursor: pointer;
        }
        .fate-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(124,58,237,.13); }

        /* 별자리 그리드 */
        .zodiac-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        @media(max-width:640px){ .zodiac-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; } }

        .zodiac-btn {
            background: white;
            border: 1.5px solid #ede9fe;
            border-radius: 16px;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            font-size: 13px;
            font-weight: 700;
            color: #6d28d9;
        }
        .zodiac-btn:hover, .zodiac-btn.active {
            background: linear-gradient(135deg, #7c3aed, #6366f1);
            color: white;
            border-color: transparent;
            transform: scale(1.06);
            box-shadow: 0 4px 20px rgba(124,58,237,.3);
        }

        /* 운세 결과 박스 */
        .result-box {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
            border-radius: 28px;
            padding: 36px 32px;
            color: white;
            display: none;
        }
        .result-box.show { display: block; animation: fadeUp .4s ease; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

        .star-bar-bg { background: rgba(255,255,255,.15); border-radius: 99px; height: 8px; overflow: hidden; }
        .star-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #fbbf24, #f59e0b); transition: width .8s ease; }

        /* 운세 탭 */
        .fortune-tab {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #94a3b8;
            transition: all .2s;
        }
        .fortune-tab.active {
            background: linear-gradient(135deg, #7c3aed, #6366f1);
            color: white;
            box-shadow: 0 4px 16px rgba(124,58,237,.3);
        }

        /* 스크롤바 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #a78bfa; border-radius: 6px; }
    </style>
</head>

<script>
// ── 운세 데이터 ──
const ZODIAC_DATA = {
    '양자리':   { symbol:'♈', element:'불', keyword:'도전·열정·개척' },
    '황소자리': { symbol:'♉', element:'흙', keyword:'안정·인내·감각' },
    '쌍둥이자리':{ symbol:'♊', element:'바람', keyword:'소통·호기심·다재다능' },
    '게자리':   { symbol:'♋', element:'물', keyword:'감성·보호·직관' },
    '사자자리': { symbol:'♌', element:'불', keyword:'자신감·창의·리더십' },
    '처녀자리': { symbol:'♍', element:'흙', keyword:'분석·섬세·완벽' },
    '천칭자리': { symbol:'♎', element:'바람', keyword:'균형·조화·미감' },
    '전갈자리': { symbol:'♏', element:'물', keyword:'집중·변혁·신비' },
    '사수자리': { symbol:'♐', element:'불', keyword:'자유·모험·낙관' },
    '염소자리': { symbol:'♑', element:'흙', keyword:'성실·책임·목표' },
    '물병자리': { symbol:'♒', element:'바람', keyword:'독창·혁신·인도주의' },
    '물고기자리':{ symbol:'♓', element:'물', keyword:'공감·상상·영성' },
};

const OVERALL_MSGS = [
    '오늘은 새로운 인연이 찾아올 가능성이 높습니다. 열린 마음으로 주변을 살펴보세요.',
    '꾸준한 노력이 빛을 발하는 날입니다. 오늘 시작한 일은 좋은 결과를 맺을 것입니다.',
    '직감을 믿으세요. 오늘 떠오르는 아이디어는 생각보다 훨씬 가치 있을 수 있습니다.',
    '주변 사람들과의 소통이 중요한 날입니다. 따뜻한 한마디가 큰 변화를 만듭니다.',
    '잠시 쉬어가도 좋습니다. 무리하지 않고 자신을 돌보는 것이 오늘의 핵심입니다.',
    '예상치 못한 행운이 찾아올 수 있는 날입니다. 작은 기회도 놓치지 마세요.',
    '오늘은 결단이 필요한 날입니다. 오래 고민했던 일을 과감하게 진행해 보세요.',
];
const ADVICE_MSGS = [
    '오늘의 행운 아이템: 보라색 소품을 가까이 두세요.',
    '오늘은 서두르지 말고 천천히 한 걸음씩 나아가세요.',
    '오늘의 행운 방향: 북동쪽. 그쪽으로 외출해 보세요.',
    '감사한 마음을 떠올리면 좋은 기운이 찾아옵니다.',
    '오늘은 새로운 것을 시도하기에 최적의 날입니다.',
    '물을 충분히 마시고 짧은 산책을 해보세요.',
    '오늘의 행운 숫자: ' + (Math.floor(Math.random()*40)+1) + '. 마음속에 새겨두세요.',
];

function rnd(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function rndN(min,max) { return Math.floor(Math.random()*(max-min+1))+min; }

// 날짜 시드 기반 (같은 날 같은 별자리 = 같은 결과)
function seededRnd(seed, max) {
    let h = 2166136261;
    for (let i=0; i<seed.length; i++) { h ^= seed.charCodeAt(i); h = (h*16777619)>>>0; }
    return h % max;
}

let currentZodiac = null;
let currentTab = 'today';

function selectZodiac(el, name, symbol) {
    document.querySelectorAll('.zodiac-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentZodiac = name;
    showResult();
}

function switchTab(el, tab) {
    document.querySelectorAll('.fortune-tab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentTab = tab;
    if (currentZodiac) showResult();
}

function showResult() {
    const today = new Date();
    const dateStr = today.getFullYear()+''+(today.getMonth()+1)+''+today.getDate();
    const seed = currentZodiac + dateStr + currentTab;

    const love   = rndN(55, 98);
    const money  = rndN(50, 96);
    const health = rndN(52, 99);

    const tabLabels = { today:'🌟 오늘의 운세', tomorrow:'🌙 내일의 운세', week:'📅 이번 주 운세', month:'📆 이달의 운세' };
    const zd = ZODIAC_DATA[currentZodiac];

    document.getElementById('result-symbol').textContent = zd.symbol;
    document.getElementById('result-zodiac').textContent = currentZodiac + ' · ' + zd.keyword;
    document.getElementById('result-tab-label').textContent = tabLabels[currentTab];
    document.getElementById('result-overall-text').textContent = OVERALL_MSGS[seededRnd(seed, OVERALL_MSGS.length)];
    document.getElementById('result-advice').textContent = '💡 ' + ADVICE_MSGS[seededRnd(seed+'a', ADVICE_MSGS.length)];

    document.getElementById('bar-love-val').textContent = love + '%';
    document.getElementById('bar-money-val').textContent = money + '%';
    document.getElementById('bar-health-val').textContent = health + '%';

    const box = document.getElementById('result-box');
    box.classList.remove('show');
    void box.offsetWidth;
    box.classList.add('show');

    setTimeout(() => {
        document.getElementById('bar-love').style.width = love + '%';
        document.getElementById('bar-money').style.width = money + '%';
        document.getElementById('bar-health').style.width = health + '%';
    }, 100);
}
</script>
