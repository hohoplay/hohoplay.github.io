name: 🌟 Daily Fortune 27 Posts

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 KST 00:00 (UTC 15:00) — 메인
    - cron: '0 16 * * *'   # 매일 KST 01:00 (UTC 16:00) — 백업 (메인 스킵 시)
  workflow_dispatch:        # 수동 실행
    inputs:
      force_monthly:
        description: '🌙 띠별 월간운세만 단독 발행 (12개)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force_monthly_test:
        description: '🧪 쥐띠 월간운세만 발행 (테스트 1개)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force_chinese_daily:
        description: '🐉 띠별 일간운세만 단독 발행 (12개)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force_date:
        description: '📅 발행 날짜 지정 (YYYY-MM-DD, 비워두면 오늘)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 24 강제 적용

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 180    # 월요일+1일 최대 49개 포스팅 대기 포함

    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v5

      - name: 🐍 Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 📦 패키지 설치
        run: pip install pandas requests

      # ─────────────────────────────────────────────────────────
      # 중복 체크: force_monthly=true(월간운세 단독) 수동 실행 시 건너뜀
      # ─────────────────────────────────────────────────────────
      - name: 🔍 오늘 이미 포스팅했는지 확인 (중복 방지)
        id: check
        if: github.event.inputs.force_monthly != 'true' && github.event.inputs.force_chinese_daily != 'true' && github.event.inputs.force_monthly_test != 'true'
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          python - <<'PYEOF'
          import os, requests
          from datetime import datetime, timezone, timedelta

          KST = timezone(timedelta(hours=9))
          today = datetime.now(KST).strftime("%Y년 %m월 %d일")

          # Access Token 갱신
          resp = requests.post("https://oauth2.googleapis.com/token", data={
              "grant_type": "refresh_token",
              "refresh_token": os.environ["BLOGGER_REFRESH_TOKEN"],
              "client_id": os.environ["GOOGLE_CLIENT_ID"],
              "client_secret": os.environ["GOOGLE_CLIENT_SECRET"],
          })
          token = resp.json().get("access_token", "")

          # 오늘 날짜 포스트 검색
          blog_id = os.environ["BLOG_ID"]
          url = f"https://www.googleapis.com/blogger/v3/blogs/{blog_id}/posts"
          r = requests.get(url, headers={"Authorization": f"Bearer {token}"},
                           params={"maxResults": 5, "fetchBodies": "false"})
          posts = r.json().get("items", [])
          already = any(today in p.get("title", "") for p in posts)

          if already:
              print(f"이미 완료 — 중복 실행 스킵")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("skip=true\n")
          else:
              print(f"포스팅 없음 — 실행 진행")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("skip=false\n")
          PYEOF

      # ─────────────────────────────────────────────────────────
      # 케이스 D: 쥐띠 월간운세 테스트 발행 (force_monthly_test=true)
      # ─────────────────────────────────────────────────────────
      - name: 🧪 쥐띠 월간운세 테스트 발행 (1개)
        if: github.event.inputs.force_monthly_test == 'true'
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          BLOGGER_TOKEN: ${{ secrets.BLOGGER_TOKEN }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DATA_DIR: ${{ github.workspace }}/data
          FORCE_MONTHLY_TEST: 'true'
          FORCE_DATE: ${{ github.event.inputs.force_date }}
        run: python scripts/create_post.py


      - name: 🌙 띠별 월간운세 단독 발행 (12개)
        if: github.event.inputs.force_monthly == 'true'
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          BLOGGER_TOKEN: ${{ secrets.BLOGGER_TOKEN }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DATA_DIR: ${{ github.workspace }}/data
          FORCE_MONTHLY: 'true'
          MONTHLY_ONLY: 'true'
        run: python scripts/create_post.py

      # ─────────────────────────────────────────────────────────
      # 케이스 C: 띠별 일간운세 단독 발행 (force_chinese_daily=true)
      # ─────────────────────────────────────────────────────────
      - name: 🐉 띠별 일간운세 단독 발행 (12개)
        if: github.event.inputs.force_chinese_daily == 'true'
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          BLOGGER_TOKEN: ${{ secrets.BLOGGER_TOKEN }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DATA_DIR: ${{ github.workspace }}/data
          FORCE_CHINESE_ONLY: 'true'
          FORCE_DATE: ${{ github.event.inputs.force_date }}
        run: python scripts/create_post.py

      # ─────────────────────────────────────────────────────────
      # 케이스 B: 정규 27개 포스팅 (스케줄 / 일반 수동 실행)
      # ─────────────────────────────────────────────────────────
      - name: 🌟 27개 운세 포스팅 실행
        if: github.event.inputs.force_monthly != 'true' && github.event.inputs.force_chinese_daily != 'true' && github.event.inputs.force_monthly_test != 'true' && steps.check.outputs.skip != 'true'
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          BLOGGER_TOKEN: ${{ secrets.BLOGGER_TOKEN }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DATA_DIR: ${{ github.workspace }}/data
        run: python scripts/create_post.py
